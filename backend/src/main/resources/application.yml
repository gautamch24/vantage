spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/vantage
    username: vantage
    password: vantage
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis

data-service:
  base-url: http://localhost:8002

anthropic:
  api-key: ${ANTHROPIC_API_KEY}

server:
  port: 8080

logging:
  level:
    com.vantage: INFO
    org.springframework.web: WARN
