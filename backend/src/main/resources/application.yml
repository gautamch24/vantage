spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5434/vantage}
    username: ${DB_USERNAME:vantage}
    password: ${DB_PASSWORD:vantage}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  cache:
    type: redis

data-service:
  base-url: ${DATA_SERVICE_URL:http://localhost:8002}

anthropic:
  api-key: ${ANTHROPIC_API_KEY}

server:
  port: ${PORT:8080}

logging:
  level:
    com.vantage: INFO
    org.springframework.web: WARN
